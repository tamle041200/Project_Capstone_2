<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Flowbite CSS -->
  <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-900 min-h-screen">

  <!-- ===== Navbar ===== -->
  <nav class="bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-white">📱 PhoneStore</h1>
      <div class="flex gap-8">
        <a href="#" class="flex flex-col items-center text-white hover:text-purple-400 transition">
          <span class="text-xl">🏠</span>
          <span class="text-sm">HOME</span>
        </a>
        <a href="#" class="flex flex-col items-center text-white hover:text-purple-400 transition">
          <span class="text-xl">🛍️</span>
          <span class="text-sm">SALE</span>
        </a>
      </div>
    </div>
  </nav>

 
  <div class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <h2 class="text-2xl font-bold text-white">Danh sách sản phẩm</h2>

      <select id="filterType"
        class="rounded-lg border-0 bg-white/90 px-4 py-2.5 text-sm font-medium text-gray-900 shadow focus:ring-2 focus:ring-white">
        <option value="all" selected>Tất cả</option>
        <option value="Samsung">Samsung</option>
        <option value="Apple">Iphone</option>
      </select>
    </div>
  </div>

  <!-- ===== Nội dung chính ===== -->
  <div class="max-w-7xl mx-auto px-4 py-8">

    <!-- Sản phẩm -->
    <div id="productList" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mb-10"></div>

    <!-- Giỏ hàng -->
    <div class="bg-gray-800 rounded-xl shadow-lg overflow-hidden">
      <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-6 py-4">
        <h3 class="text-xl font-bold text-white">🛒 Giỏ hàng</h3>
      </div>

      <div class="p-6">
        <table class="w-full text-left">
          <thead>
            <tr class="text-gray-400 text-sm border-b border-gray-700">
              <th class="pb-3">Sản phẩm</th>
              <th class="pb-3">Giá</th>
              <th class="pb-3">Số lượng</th>
              <th class="pb-3">Thành tiền</th>
              <th class="pb-3"></th>
            </tr>
          </thead>
          <tbody id="cartTable" class="text-white"></tbody>
        </table>

        <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-700">
          <h3 class="text-xl font-bold text-white">
            Tổng tiền: <span id="tongTien" class="text-purple-400">0</span>$
          </h3>
          <button onclick="thanhToan()"
            class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white px-6 py-3 rounded-lg font-medium shadow-lg transition">
            Thanh toán
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Tailwind js -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Flowbite js -->
  <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
  
  <!-- axios -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
    integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script type="module" src="main.js"></script>
</body>

</html>
