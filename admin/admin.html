<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <!-- Font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- flowbite -->
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="flex h-screen bg-indigo-100">
      <!-- sidebar -->
      <aside class="w-64 bg-indigo-300 text-black">
        <div class="p-5 text-2xl font-bold border-b border-slate-700">
          Admin
        </div>

        <ul class="p-4 space-y-2">
          <li>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-700">
              Dashboard
            </a>
          </li>

          <li>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-700">
              Products
            </a>
          </li>

          <li>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-700">
              Orders
            </a>
          </li>

          <li>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-700">
              Users
            </a>
          </li>

          <li>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-700">
              Settings
            </a>
          </li>
        </ul>
      </aside>

      <!-- main -->
      <section class="p-5 flex-1 w-full">
        <nav class="flex m-5 justify-left text-center text-2xl">
          <a href="../index.html"
            ><i class="fa-regular fa-house"></i>
            <p>HOME</p></a
          >
          <a class="mx-20" href="../user/user.html"
            ><i class="fa-brands fa-shopify"></i>
            <p>SALE</p></a
          >
        </nav>

        <div
          class="bg-indigo-400 rounded-t-lg p-4 flex justify-between items-center"
        >
          <h2 class="text-3xl font-bold text-black">Phone Management</h2>
          <div class="ml-50">
            <select
              id="filterBrand"
              class="min-w-[150px] border px-4 py-3 rounded border-blue-900 bg-indigo-100"
            >
              <option value="all">All Brand</option>
              <option value="Samsung">Samsung</option>
              <option value="Apple">Apple</option>
            </select>

            <select
              id="sortPrice"
              class="min-w-[150px] border px-4 py-3 rounded border-blue-900 bg-indigo-100"
            >
              <option value="all">Sort Price</option>
              <option value="tang">Low → High</option>
              <option value="giam">High → Low</option>
            </select>
          </div>
          <button
            id="btnAddForm"
            data-modal-target="crud-modal"
            data-modal-toggle="crud-modal"
            class="block text-black bg-blue-600 hover:bg-indigo-200 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
            type="button"
          >
            ADD PHONE
          </button>
        </div>
        <table class="w-full border-1">
          <thead>
            <tr class="border-b">
              <th class="text-left p-4">STT</th>
              <th class="text-left p-4">Name</th>
              <th class="text-left p-4">Price</th>
              <th class="text-left p-4">Img</th>
              <th class="text-left p-4">Description</th>
              <th class="text-left p-4">
                <i class="fa-solid fa-gear"></i>
                Action
              </th>
            </tr>
          </thead>

          <tbody id="tablePhone"></tbody>
        </table>
      </section>
      <!-- modal -->
      <div
        id="crud-modal"
        tabindex="-1"
        aria-hidden="true"
        class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
      >
        <div class="relative p-4 w-full max-w-md max-h-full">
          <!-- Modal content -->
          <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <!-- Modal header -->
            <div
              class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200"
            >
              <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                Create New Product
              </h3>
              <button
                id="close"
                type="button"
                class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
                data-modal-toggle="crud-modal"
              >
                <svg
                  class="w-3 h-3"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 14 14"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
                  />
                </svg>
                <span class="sr-only">Close modal</span>
              </button>
            </div>
            <!-- Modal body -->
            <form id="form" class="p-4 md:p-5">
              <div class="grid gap-4 mb-4 grid-cols-2">
                <div>
                  <div class="col-span-2">
                    <label
                      for="name"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Name</label
                    >
                    <input
                      type="text"
                      name="name"
                      id="name"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                      placeholder="Product name"
                      required=""
                    />
                  </div>
                  <span
                    id="divName"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div>
                  <div class="col-span-2 sm:col-span-1">
                    <label
                      for="price"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Price</label
                    >
                    <input
                      type="number"
                      name="price"
                      id="price"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                      placeholder="$2999"
                      required=""
                    />
                  </div>
                  <span
                    id="divPrice"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div>
                  <div class="col-span-2 sm:col-span-1">
                    <label
                      for="type"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Type</label
                    >
                    <select
                      id="type"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                    >
                      <option selected="">Branch</option>
                      <option value="Apple">Apple</option>
                      <option value="Samsung">Samsung</option>
                    </select>
                  </div>
                  <span
                    id="divType"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div>
                  <div class="col-span-2">
                    <label
                      for="screen"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Screen</label
                    >
                    <input
                      type="text"
                      name="screen"
                      id="screen"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                      placeholder="Creen"
                      required=""
                    />
                  </div>
                  <span
                    id="divScreen"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div>
                  <div class="col-span-2">
                    <label
                      for="backCamera"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Back Camera</label
                    >
                    <input
                      type="text"
                      name=""
                      id="backCamera"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                      placeholder="Back Camera"
                      required=""
                    />
                  </div>
                  <span
                    id="divBackCamera"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div>
                  <div class="col-span-2">
                    <label
                      for="frontCamera"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Front Camera</label
                    >
                    <input
                      type="text"
                      name="frontCamera"
                      id="frontCamera"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                      placeholder="Front Camera"
                      required=""
                    />
                  </div>
                  <span
                    id="divFrontCamera"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div>
                  <div class="col-span-2">
                    <label
                      for="image"
                      class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                      >Image Link</label
                    >
                    <input
                      type="text"
                      name="image"
                      id="image"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
                      placeholder="Image link"
                      required=""
                    />
                  </div>
                  <span
                    id="divImg"
                    class="hidden text-red-500 text-xs mt-1 block"
                  ></span>
                </div>
                <div class="col-span-2">
                  <label
                    for="description"
                    class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                    >Product Description</label
                  >
                  <textarea
                    id="description"
                    rows="4"
                    class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                    placeholder="Write product description here"
                  ></textarea>
                </div>
              </div>
              <button
                id="btnAdd"
                onclick="addProduct()"
                type="button"
                class="text-white inline-flex items-center bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
              >
                <svg
                  class="me-1 -ms-1 w-5 h-5"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    fill-rule="evenodd"
                    d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
                Add new product
              </button>
              <div id="btnEdit"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- flowbite -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./admin.js"></script>
    <!-- axios -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
      integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
